name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Native build deps for the viewer crate's Slint backend chain
      # (Skia -> fontconfig + freetype, winit -> xkbcommon). Without
      # these, yeslogic-fontconfig-sys fails its pkg-config probe with
      # "Package fontconfig was not found" and the whole workspace
      # build dies during clippy/check. Static literals only -- no
      # github.event.* interpolation here.
      - name: Install Slint native deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            clang \
            cmake \
            ninja-build

      # Smart Rust-aware cache: keys include Cargo.lock + the rustc
      # version, so the cache is invalidated when either changes
      # (instead of every Cargo.toml edit, as the old actions/cache
      # key did). Also strips target/ of intermediate artefacts that
      # rebuild faster than they restore, so the cache stays bounded
      # in size. With Skia in the dep tree (via the viewer crate's
      # renderer-skia feature) the first cold compile takes ~10 min;
      # cache hits drop that to seconds.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          # Cache the workspace root. Single shared cache across all
          # jobs (fmt / clippy / check / test) — they all reuse the
          # same compiled deps.
          workspaces: ". -> target"
          # Bump if you want to force-invalidate the cache without
          # touching Cargo.lock (e.g. after a Slint major-version
          # bump shakes loose stale Skia bindings).
          prefix-key: "v1"
          # Save the cache even if a job step fails — so a one-off
          # test failure doesn't waste the 10-min Skia rebuild on
          # the next retry.
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}

      - name: Install just
        uses: extractions/setup-just@v2

      # Single `just ci` step instead of separate clippy + test steps.
      # The recipe sets `RUSTC_WORKSPACE_WRAPPER=clippy-driver` for the
      # `cargo test` invocation, which makes it compile workspace
      # crates through clippy-driver — the subsequent `cargo clippy`
      # in the recipe then reuses those artefacts instead of
      # rebuilding everything from scratch. Saves ~6 min of duplicated
      # workspace compile on a cold cache (the previous flow took
      # ~13 min for clippy + test; combined drops to ~7 min).
      - name: ci (fmt-check + clippy + test, shared workspace compile)
        run: just ci
