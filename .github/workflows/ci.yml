name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Native build deps for the viewer crate's Slint backend chain
      # (Skia -> fontconfig + freetype, winit -> xkbcommon). Without
      # these, yeslogic-fontconfig-sys fails its pkg-config probe with
      # "Package fontconfig was not found" and the whole workspace
      # build dies during clippy/check. Static literals only -- no
      # github.event.* interpolation here.
      - name: Install Slint native deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            clang \
            cmake \
            ninja-build

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: fmt-check
        run: just fmt-check

      - name: clippy
        run: just clippy

      - name: check
        run: just check

      - name: test
        run: just test
