name: Deploy catalogue to GitHub Pages

# Runs on every push to main (the catalogue is part of the README's
# advertising surface, so keeping it in sync with main is the
# priority) and on manual dispatch from the Actions tab.
#
# Security note: no `run:` block interpolates `github.event.*` data,
# `github.head_ref`, or any other potentially-attacker-controlled
# value. The only template expression in a run-shell context is
# `steps.deployment.outputs.page_url`, which is GitHub-generated.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Trunk is the same build path `just serve` uses locally — keeps
      # local dev and the deployed artefact byte-identical (modulo the
      # release-profile timestamp). The previous wasm-pack-based step
      # emitted files into `pkg/` with underscored names; index.html
      # imports a trunk-style dashed name at the dist root, so the
      # mismatch returned 404 on Firefox with `NS_ERROR_CORRUPTED`.
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build wasm-viewer
        working-directory: crates/wasm-viewer/web
        run: trunk build --release --dist ../../../dist --public-url /slint-mobile-components/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
