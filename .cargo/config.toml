# Project-specific cargo aliases. Defined here rather than as separate
# shell wrappers so they work uniformly on macOS, Linux, and Windows.
[alias]
# `cargo xtask <subcommand>` — runs the workspace tooling crate.
xtask = "run --package xtask --"
# `cargo view` — paginated UI browser. Interpreter-backed, so the binary
# itself stays cheap to compile no matter how many page templates exist.
# Use this instead of `cargo show` for everyday "what does the UI look
# like" browsing.
view = "run --package slint-mobile-components-viewer --release"
# `cargo map [page-name] [tiles-dir]` — live demo of any of the six
# map-using pages with real OpenStreetMap tiles wired through
# slint-mapping. Defaults to MapPage + the sample tile bundle shipped
# under slint-mapping/sample-tiles/.
map = "run --package slint-mobile-components-map-demo --release --"
