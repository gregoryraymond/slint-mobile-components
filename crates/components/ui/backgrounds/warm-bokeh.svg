<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 892" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="warmBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5b1f3d"/>
      <stop offset="50%" stop-color="#a23a4b"/>
      <stop offset="100%" stop-color="#f0995a"/>
    </linearGradient>
    <radialGradient id="bokehPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff7aae" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff7aae" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff7aae" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffc466" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffc466" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffc466" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#b557ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#b557ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b557ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="412" height="892" fill="url(#warmBase)"/>
  <!-- big out-of-focus highlights ("bokeh") -->
  <g>
    <circle cx="60"  cy="120" r="160" fill="url(#bokehAmber)"/>
    <circle cx="340" cy="220" r="200" fill="url(#bokehPink)"/>
    <circle cx="120" cy="540" r="240" fill="url(#bokehMagenta)"/>
    <circle cx="380" cy="700" r="180" fill="url(#bokehAmber)"/>
    <circle cx="80"  cy="820" r="160" fill="url(#bokehPink)"/>
    <circle cx="260" cy="420" r="120" fill="url(#bokehAmber)"/>
  </g>
</svg>
