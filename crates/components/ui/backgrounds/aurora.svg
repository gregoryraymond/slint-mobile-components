<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 892" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0b0820"/>
      <stop offset="40%" stop-color="#1a0f3a"/>
      <stop offset="80%" stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="auroraGreen" cx="30%" cy="35%" r="55%">
      <stop offset="0%"  stop-color="#22d3a8" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22d3a8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22d3a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraViolet" cx="75%" cy="55%" r="50%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraTeal" cx="20%" cy="85%" r="45%">
      <stop offset="0%"  stop-color="#06b6d4" stop-opacity="0.40"/>
      <stop offset="70%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="412" height="892" fill="url(#sky)"/>
  <rect width="412" height="892" fill="url(#auroraGreen)"/>
  <rect width="412" height="892" fill="url(#auroraViolet)"/>
  <rect width="412" height="892" fill="url(#auroraTeal)"/>
  <!-- distant stars so transparency over the bg has visible texture to occlude -->
  <g fill="#ffffff" fill-opacity="0.6">
    <circle cx="38"  cy="62"  r="1.1"/>
    <circle cx="92"  cy="118" r="0.8"/>
    <circle cx="170" cy="44"  r="1.3"/>
    <circle cx="248" cy="92"  r="0.9"/>
    <circle cx="324" cy="50"  r="1.0"/>
    <circle cx="380" cy="130" r="0.8"/>
    <circle cx="58"  cy="220" r="0.9"/>
    <circle cx="200" cy="170" r="1.2"/>
    <circle cx="356" cy="200" r="0.8"/>
    <circle cx="120" cy="260" r="0.9"/>
    <circle cx="290" cy="240" r="1.0"/>
    <circle cx="22"  cy="300" r="0.8"/>
  </g>
</svg>
