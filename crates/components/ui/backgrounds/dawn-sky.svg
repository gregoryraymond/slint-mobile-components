<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 892" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fdc26b"/>
      <stop offset="25%" stop-color="#fb6a8e"/>
      <stop offset="55%" stop-color="#a23a8e"/>
      <stop offset="80%" stop-color="#3b2870"/>
      <stop offset="100%" stop-color="#0e1438"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="22%" r="20%">
      <stop offset="0%"  stop-color="#fff7c0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#fdc26b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fdc26b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="412" height="892" fill="url(#sky)"/>
  <!-- Soft sun halo near the top so transparent surfaces above it have something distinctive to occlude -->
  <rect width="412" height="892" fill="url(#sun)"/>
</svg>
