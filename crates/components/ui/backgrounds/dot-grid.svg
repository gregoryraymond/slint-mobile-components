<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 892" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0f1525"/>
      <stop offset="100%" stop-color="#1a1f33"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.4" fill="#ffffff" fill-opacity="0.10"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="0%" r="80%">
      <stop offset="0%"  stop-color="#4f8cff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="412" height="892" fill="url(#bgBase)"/>
  <rect width="412" height="892" fill="url(#dots)"/>
  <rect width="412" height="892" fill="url(#vignette)"/>
</svg>
