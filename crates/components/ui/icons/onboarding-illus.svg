<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d24" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#9a4fff"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="url(#bg)"/>

  <!-- Background pulse rings -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="#4f8cff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="160" cy="160" r="100" fill="none" stroke="#4f8cff" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="160" cy="160" r="60" fill="none" stroke="#4f8cff" stroke-opacity="0.24" stroke-width="2"/>

  <!-- Floating cards composition -->
  <g transform="rotate(-12 80 160)">
    <rect x="40" y="120" width="80" height="100" rx="12" fill="url(#card2)"/>
    <rect x="56" y="140" width="48" height="6" rx="3" fill="#fff" fill-opacity="0.5"/>
    <rect x="56" y="156" width="36" height="6" rx="3" fill="#fff" fill-opacity="0.3"/>
    <rect x="56" y="180" width="48" height="28" rx="6" fill="#fff" fill-opacity="0.15"/>
  </g>

  <g transform="rotate(8 160 140)">
    <rect x="120" y="100" width="80" height="100" rx="12" fill="url(#card)"/>
    <circle cx="160" cy="130" r="14" fill="#fff" fill-opacity="0.4"/>
    <rect x="136" y="156" width="48" height="6" rx="3" fill="#fff" fill-opacity="0.5"/>
    <rect x="136" y="172" width="36" height="6" rx="3" fill="#fff" fill-opacity="0.3"/>
  </g>

  <g transform="rotate(15 240 160)">
    <rect x="200" y="120" width="80" height="100" rx="12" fill="#2d313a"/>
    <rect x="216" y="140" width="36" height="6" rx="3" fill="#9aa0a6"/>
    <rect x="216" y="156" width="48" height="6" rx="3" fill="#9aa0a6" fill-opacity="0.7"/>
    <rect x="216" y="180" width="48" height="28" rx="6" fill="#4f8cff" fill-opacity="0.6"/>
  </g>
</svg>
