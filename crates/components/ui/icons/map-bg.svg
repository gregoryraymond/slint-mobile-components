<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 600">
  <defs>
    <linearGradient id="mapbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#23262f"/>
    </linearGradient>
  </defs>

  <rect width="412" height="600" fill="url(#mapbg)"/>

  <!-- Park area (green-tinted polygon) -->
  <path d="M 60 340 L 180 320 L 200 420 L 100 460 Z" fill="#22c55e" fill-opacity="0.10"/>
  <path d="M 280 80 L 380 100 L 360 220 L 260 200 Z" fill="#22c55e" fill-opacity="0.08"/>

  <!-- Major roads (horizontal) -->
  <line x1="0" y1="180" x2="412" y2="180" stroke="#2d313a" stroke-width="6"/>
  <line x1="0" y1="380" x2="412" y2="380" stroke="#2d313a" stroke-width="6"/>
  <line x1="0" y1="500" x2="412" y2="500" stroke="#2d313a" stroke-width="4"/>

  <!-- Major roads (vertical) -->
  <line x1="120" y1="0" x2="120" y2="600" stroke="#2d313a" stroke-width="6"/>
  <line x1="240" y1="0" x2="240" y2="600" stroke="#2d313a" stroke-width="4"/>
  <line x1="340" y1="0" x2="340" y2="600" stroke="#2d313a" stroke-width="6"/>

  <!-- Minor roads (thinner, more) -->
  <line x1="0" y1="80" x2="412" y2="80" stroke="#23262f" stroke-width="2"/>
  <line x1="0" y1="260" x2="412" y2="260" stroke="#23262f" stroke-width="2"/>
  <line x1="0" y1="440" x2="412" y2="440" stroke="#23262f" stroke-width="2"/>
  <line x1="60" y1="0" x2="60" y2="600" stroke="#23262f" stroke-width="2"/>
  <line x1="180" y1="0" x2="180" y2="600" stroke="#23262f" stroke-width="2"/>
  <line x1="300" y1="0" x2="300" y2="600" stroke="#23262f" stroke-width="2"/>
  <line x1="380" y1="0" x2="380" y2="600" stroke="#23262f" stroke-width="2"/>

  <!-- Building blocks (subtle) -->
  <rect x="20"  y="220" width="32" height="28" fill="#2d313a" opacity="0.7"/>
  <rect x="70"  y="200" width="42" height="50" fill="#2d313a" opacity="0.7"/>
  <rect x="130" y="220" width="38" height="32" fill="#2d313a" opacity="0.5"/>
  <rect x="190" y="200" width="40" height="48" fill="#2d313a" opacity="0.6"/>
  <rect x="250" y="220" width="42" height="30" fill="#2d313a" opacity="0.7"/>
  <rect x="310" y="280" width="22" height="80" fill="#2d313a" opacity="0.5"/>
  <rect x="350" y="240" width="48" height="40" fill="#2d313a" opacity="0.7"/>

  <rect x="20"  y="400" width="34" height="34" fill="#2d313a" opacity="0.7"/>
  <rect x="130" y="500" width="44" height="36" fill="#2d313a" opacity="0.5"/>
  <rect x="250" y="420" width="40" height="60" fill="#2d313a" opacity="0.6"/>
  <rect x="350" y="520" width="48" height="44" fill="#2d313a" opacity="0.7"/>

  <!-- Highlight pin "you are here" -->
  <circle cx="206" cy="300" r="18" fill="#4f8cff" fill-opacity="0.20"/>
  <circle cx="206" cy="300" r="6"  fill="#4f8cff"/>
</svg>
