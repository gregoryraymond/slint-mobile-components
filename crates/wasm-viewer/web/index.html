<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>slint-mobile-components — catalogue</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234f8cff' d='M7 2h10a3 3 0 0 1 3 3v14a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3zm5 17a1 1 0 1 0 0-2 1 1 0 0 0 0 2z'/%3E%3C/svg%3E">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0f1115;
            color: #ddd;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        canvas {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="loading">Loading slint-mobile-components catalogue…</div>
    <script type="module">
        // Size the canvas to whatever room it has — works both as a
        // top-level document and inside an iframe. Slint's winit-web
        // backend attaches to <canvas id="canvas"> and uses its
        // CSS width / height as the Window's logical px dimensions;
        // the framebuffer pixel attributes are DPR-multiplied for
        // HiDPI sharpness.
        //
        // We size from the canvas's *own* getBoundingClientRect, not
        // from window.innerWidth — inside an iframe the canvas's box
        // is what we should fill (CSS sets it to position:absolute /
        // inset:0), and window.innerWidth may not reflect a parent-
        // driven resize. A ResizeObserver on the canvas catches every
        // case: initial layout, browser resize, devtools toggle,
        // iframe outer-container resize.
        const canvas = document.getElementById('canvas');
        const sizeCanvas = () => {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const cssW = Math.max(1, Math.round(rect.width));
            const cssH = Math.max(1, Math.round(rect.height));
            canvas.width = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);
            canvas.style.width = cssW + 'px';
            canvas.style.height = cssH + 'px';
        };
        sizeCanvas();
        // ResizeObserver fires synchronously after layout changes the
        // canvas's box. Belt-and-braces: also keep the window resize
        // listener as a fallback in older browsers.
        if ('ResizeObserver' in window) {
            new ResizeObserver(sizeCanvas).observe(canvas);
        }
        window.addEventListener('resize', sizeCanvas);
    </script>
    <script type="module">
        import init, { embedded_file_count } from './pkg/slint_mobile_components_wasm_viewer.js';

        // winit's web backend yields control back to the browser by
        // throwing a JS exception — documented mechanism, not a
        // failure. Filter so the catch handler doesn't show a red
        // overlay on top of a perfectly working canvas.
        const WINIT_CONTROL_FLOW = /Using exceptions for control flow/;

        try {
            await init();
            // Sanity-print embedded source count to the console so a
            // visitor with devtools open can see how many .slint
            // sources made it into the wasm bundle. ~165 expected
            // (theme + components + ~140 non-map pages).
            try {
                console.log(`slint-mobile-components: embedded ${embedded_file_count()} .slint sources`);
            } catch (e) { /* probe optional */ }
            document.getElementById('loading')?.remove();
        } catch (err) {
            if (WINIT_CONTROL_FLOW.test(String(err?.message ?? err))) {
                try {
                    console.log(`slint-mobile-components: embedded ${embedded_file_count()} .slint sources`);
                } catch (e) { /* probe optional */ }
                document.getElementById('loading')?.remove();
            } else {
                const el = document.getElementById('loading');
                if (el) {
                    el.textContent = 'Failed to start catalogue — see console for details.';
                    el.style.opacity = '1';
                    el.style.color = '#ef4444';
                }
                console.error(err);
            }
        }
    </script>
</body>
</html>
